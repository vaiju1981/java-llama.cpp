          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      # Runs even when the deploy step failed: a Central publish-poll timeout reds the
      # job *after* the bundle was uploaded (and typically published server-side), while
      # the signed jars + .asc files already exist in target/ (signing happens at
      # verify). Collecting on failure lets the github-release-signed job still attach them.
      - name: Collect signed artifacts
        if: ${{ !cancelled() }}
        run: |
          mkdir -p signed-release-assets
          cp llama/target/*.jar signed-release-assets/ 2>/dev/null || true
          cp llama/target/*.jar.asc signed-release-assets/ 2>/dev/null || true
          cp llama-langchain4j/target/*.jar signed-release-assets/ 2>/dev/null || true
          cp llama-langchain4j/target/*.jar.asc signed-release-assets/ 2>/dev/null || true
          cp llama-kotlin/target/*.jar signed-release-assets/ 2>/dev/null || true
          cp llama-kotlin/target/*.jar.asc signed-release-assets/ 2>/dev/null || true
          cp llama-android/build/aar/*.aar signed-release-assets/ 2>/dev/null || true
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: signed-release-assets
          path: signed-release-assets/

  github-release-signed:
    name: Attach Signed Binaries to GitHub Release
    needs: [publish-release, package-fatjars]
    # Also runs when publish-release FAILED (not when skipped/cancelled): a Central
    # publish-poll timeout reds that job after the artifacts were already uploaded —
    # the GitHub release assets must not be lost in that case.
    if: ${{ !cancelled() && (needs.publish-release.result == 'success' || needs.publish-release.result == 'failure') && needs.package-fatjars.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: signed-release-assets
          path: release-assets/
      # All-backends server fat jars (+ default CPU fat jar + sha256 files) — GitHub
      # download assets only, deliberately NOT deployed to Maven Central. Downloaded
      # into the same directory so the one upload glob below picks everything up
      # (fat-jar names are disjoint from the signed thin-jar names).
      - uses: actions/download-artifact@v8
        with:
          name: llama-fatjars
          path: release-assets/
      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*

      # Portal bundle and uploaded via the Publisher API (publishingType=AUTOMATIC:
      # the deployment publishes as soon as portal validation passes). Natives are
      # already on disk from the artifact downloads above; the core jar was just
      # built by the reactor deploy.
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.14.3"
      - name: Publish Android AAR release bundle to Central Portal
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p llama-android/natives/cpu/arm64-v8a llama-android/natives/cpu/x86_64 llama-android/natives/opencl/arm64-v8a
          cp llama/src/main/resources/net/ladenthin/llama/Linux-Android/aarch64/libjllama.so llama-android/natives/cpu/arm64-v8a/
          cp llama/src/main/resources/net/ladenthin/llama/Linux-Android/x86_64/libjllama.so llama-android/natives/cpu/x86_64/
          cp llama/src/main/resources_android_opencl/net/ladenthin/llama/Linux-Android/aarch64/libjllama.so llama-android/natives/opencl/arm64-v8a/
          gradle -p llama-android publishAllPublicationsToStagingRepository
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n1)
          ( cd llama-android/build/staging-repo && zip -r -q ../central-bundle.zip net -x "*maven-metadata*" )
          TOKEN=$(printf "%s:%s" "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64 -w0)
          curl --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -F "bundle=@llama-android/build/central-bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC&name=llama-android-$VERSION"

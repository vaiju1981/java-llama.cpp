name: Publish
on:
  push:
    branches: [ main ]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      publish_to_central:
        description: "Deploy to Maven Central (snapshot if -SNAPSHOT, release if a vX.Y.Z tag)"
        type: boolean
        default: false
      use_cache:
        description: "Use the shared sccache/Depot compiler cache (faster incremental builds)"
        type: boolean
        default: true
env:
  JAVA_VERSION: '21'
  # Model DOWNLOAD URLS live in .github/models.csv (the single source of truth for the
  # CI model set; the model cache key is derived from that file's hash). The *_NAME
  # vars below are consumer-side wiring only (-Dnet.ladenthin.llama.* test properties)
  # and must match the filename column of models.csv.
  MODEL_NAME: "codellama-7b.Q2_K.gguf"
  RERANKING_MODEL_NAME: "jina-reranker-v1-tiny-en-Q4_0.gguf"
  DRAFT_MODEL_NAME: "AMD-Llama-135m-code.Q2_K.gguf"
  REASONING_MODEL_NAME: "Qwen3-0.6B-Q4_K_M.gguf"
  TOOL_MODEL_NAME: "Qwen2.5-1.5B-Instruct-Q4_K_M.gguf"
  NOMIC_EMBED_MODEL_NAME: "nomic-embed-text-v1.5.f16.gguf"
  # Vision model + mmproj for MultimodalIntegrationTest.
  # SmolVLM-500M is the smallest community vision GGUF that loads reliably
  # under the upstream mtmd pipeline.
  VISION_MODEL_NAME: "SmolVLM-500M-Instruct-Q8_0.gguf"
  VISION_MMPROJ_NAME: "mmproj-SmolVLM-500M-Instruct-Q8_0.gguf"
  # Text-to-speech models for AudioInputIntegrationTest's sibling TtsIntegrationTest (OuteTTS pipeline).
  TTS_MODEL_NAME: "OuteTTS-0.2-500M-Q4_K_M.gguf"
  TTS_VOCODER_NAME: "WavTokenizer-Large-75-F16.gguf"
  # Test image used by MultimodalIntegrationTest is committed to the repo
  # at src/test/resources/images/test-image.jpg (see the README in that
  # directory for licensing). No download step is needed; CI just points
  # mvn test at the committed path.
  VISION_IMAGE_PATH: "llama/src/test/resources/images/test-image.jpg"
permissions:
  contents: read
jobs:

  # ---------------------------------------------------------------------------
  # Start gate — single cancellable abort window before the pipeline starts.
  # The wait duration lives in the `startgate` GitHub Environment (Settings →
  # Environments → startgate → Wait timer).
  # ---------------------------------------------------------------------------

  startgate:
    name: Start gate (abort window)
    runs-on: ubuntu-latest
    environment: startgate
    steps:
      - run: echo "Start gate elapsed — proceeding with pipeline."

  # ---------------------------------------------------------------------------
  # GPG signing-key preflight (standalone, no `needs:` — runs in parallel at the
  # very start on every trigger). Reproduces what maven-gpg-plugin does at deploy
  # time so a bad/expired key or wrong passphrase is caught in ~20s instead of
  # failing the publish stage. Declares `environment: maven-central` so it reads
  # the SAME GPG_PRIVATE_KEY / GPG_PASSPHRASE secret the publish jobs use.
  #
  # It is EXPECTED to go RED on refs where the secret is not delivered — fork PRs
  # and other contributors' branches (secrets are withheld there). That red is
  # the intended signal: "this ref cannot sign a release", not a regression.
  #
  # SECURITY: this job NEVER prints secret material. It imports the key into an
  # ephemeral keyring, prints only PUBLIC key metadata (key id, fingerprint,
  # owner UID, algorithm, created/expiry — all of which live on public
  # keyservers), and validates the passphrase by producing + verifying a
  # throwaway signature. The passphrase is passed on fd 3 (never argv, never a
  # log line), `set -x` is deliberately never enabled, and the passphrase is
  # additionally `::add-mask::`ed.
  # ---------------------------------------------------------------------------
  verify-signing-key:
    name: Verify GPG signing key (no secrets printed)
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - name: Import key + run sign/verify self-test (prints only PUBLIC metadata)
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail   # NOTE: deliberately NO `set -x` — it would echo the passphrase.

          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "::error::GPG_PRIVATE_KEY is empty for this run. Either the secret is not set, or it is scoped to a different environment/branch than 'maven-central' on this ref. Nothing to verify."
            exit 1
          fi
          # Defensive: even though we never print it, register the passphrase as a
          # masked value so any accidental echo downstream is redacted.
          if [ -n "${GPG_PASSPHRASE:-}" ]; then echo "::add-mask::${GPG_PASSPHRASE}"; fi

          echo "gpg: $(gpg --version | head -n1)"

          # Ephemeral, private keyring; removed on exit.
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          cleanup() { gpgconf --kill gpg-agent >/dev/null 2>&1 || true; rm -rf "$GNUPGHOME"; }
          trap cleanup EXIT

          echo "== Import private key into an ephemeral keyring (key via stdin, never argv) =="
          printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import

          COLONS="$(gpg --list-secret-keys --with-colons --fixed-list-mode)"
          SECCOUNT="$(printf '%s\n' "$COLONS" | awk -F: '$1=="sec"{n++} END{print n+0}')"
          echo "Secret keys imported: $SECCOUNT"
          if [ "$SECCOUNT" -lt 1 ]; then
            echo "::error::No secret key was imported — GPG_PRIVATE_KEY is not a valid armored secret key (check that the secret contains the full -----BEGIN PGP PRIVATE KEY BLOCK----- with intact newlines)."
            exit 1
          fi

          KEYID="$(printf '%s\n' "$COLONS"  | awk -F: '$1=="sec"{print $5; exit}')"
          ALGO="$(printf '%s\n'  "$COLONS"  | awk -F: '$1=="sec"{print $4; exit}')"
          CREATED="$(printf '%s\n' "$COLONS"| awk -F: '$1=="sec"{print $6; exit}')"
          EXPIRES="$(printf '%s\n' "$COLONS"| awk -F: '$1=="sec"{print $7; exit}')"
          FPR="$(printf '%s\n'   "$COLONS"  | awk -F: '$1=="fpr"{print $10; exit}')"

          echo "== PUBLIC key metadata =="
          echo "  Key ID (long):  $KEYID"
          echo "  Fingerprint:    $FPR"
          echo "  Pubkey algo id: $ALGO"
          echo "  Created (UTC):  $(date -u -d "@$CREATED" 2>/dev/null || echo "$CREATED")"
          echo "  Owner UID(s):"
          printf '%s\n' "$COLONS" | awk -F: '$1=="uid"{print "    - " $10}'

          # --- Expiration gate ---
          NOW="$(date -u +%s)"
          if [ -n "$EXPIRES" ]; then
            echo "  Expires (UTC):  $(date -u -d "@$EXPIRES" 2>/dev/null || echo "$EXPIRES")"
            if [ "$EXPIRES" -le "$NOW" ]; then
              echo "::error::Signing key is EXPIRED — Maven Central will reject its signatures. Extend the key's expiry and update the GPG_PRIVATE_KEY secret."
              exit 1
            fi
            echo "  Days to expiry: $(( (EXPIRES - NOW) / 86400 ))"
            if [ "$(( (EXPIRES - NOW) / 86400 ))" -lt 30 ]; then
              echo "::warning::Signing key expires in under 30 days — plan to rotate it."
            fi
          else
            echo "  Expires (UTC):  never"
          fi

          # --- Signing-capability gate ---
          if printf '%s\n' "$COLONS" | awk -F: '($1=="sec"||$1=="ssb"){print $12}' | grep -q 's'; then
            echo "  Signing capability: present"
          else
            echo "::error::No signing-capable (sub)key found — this key cannot produce release signatures."
            exit 1
          fi

          # --- Passphrase unlock + sign + verify roundtrip (the exact failure mode) ---
          # Passphrase on fd 3 only. Payload is a throwaway nonce; only the signature's
          # validity (exit codes) matters — no secret is ever emitted.
          echo "== Passphrase unlock + detached-sign + verify self-test =="
          WORK="$(mktemp -d)"
          printf '%s' "ai-index signing-selftest" > "$WORK/payload.txt"
          gpg --batch --yes --pinentry-mode loopback --passphrase-fd 3 \
              --local-user "$KEYID" \
              --detach-sign --armor --output "$WORK/payload.txt.asc" "$WORK/payload.txt" \
              3<<<"${GPG_PASSPHRASE:-}"
          echo "  Signature produced: $(wc -c < "$WORK/payload.txt.asc") armored bytes"
          gpg --batch --verify "$WORK/payload.txt.asc" "$WORK/payload.txt"
          rm -rf "$WORK"

          echo "RESULT: OK — key imports, is not expired, is signing-capable, and the passphrase successfully unlocked it to produce a VALID signature. maven-gpg-plugin will be able to sign with this key/passphrase."

  # ---------------------------------------------------------------------------
  # GPG signing-key preflight — GRADLE / BouncyCastle path.
  # Companion to the `verify-signing-key` (gpg) job above: that one mirrors
  # maven-gpg-plugin (how the Maven artifacts are signed); this one drives
  # Gradle's `signing` plugin + `useInMemoryPgpKeys` (BouncyCastle) — the path any
  # Gradle-based publish (e.g. an Android AAR) uses to sign. BouncyCastle is a
  # STRICTER parser of the armored key than gpg, so it catches key/format problems
  # gpg tolerates (e.g. the primary-vs-signing-subkey null-PGPPrivateKey issue).
  # It signs a throwaway project (.github/signing-selftest/) — no repo build is
  # involved — so this job is IDENTICAL across the sibling repos and validates the
  # release key via the Gradle path even in repos that do not publish via Gradle
  # yet ("prepared for Gradle"). Standalone (no `needs:`), parallel at pipeline
  # start, `environment: maven-central` so it reads the same secret the publish
  # uses. Red-by-design where the secret is not delivered (see the gpg job's note).
  #
  # SECURITY: prints no secret material. Key/passphrase reach Gradle only via env
  # (read by System.getenv at runtime); `set -x` is never enabled; the passphrase
  # is `::add-mask::`ed; Gradle runs with `--stacktrace` only. Only the produced
  # `.asc` (exit code) is asserted. Uses Gradle 8.14.3.
  # ---------------------------------------------------------------------------
  verify-signing-key-gradle:
    name: Verify GPG signing key — Gradle/BouncyCastle path (no secrets printed)
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.14.3"
      - name: Sign a throwaway artifact via useInMemoryPgpKeys (BouncyCastle)
        shell: bash
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -euo pipefail   # NOTE: deliberately NO `set -x` — it would echo the passphrase.

          if [ -z "${MAVEN_GPG_PRIVATE_KEY:-}" ]; then
            echo "::error::MAVEN_GPG_PRIVATE_KEY is empty for this run. The maven-central environment did not deliver the secret to this ref (fork PR / other branch). Nothing to verify."
            exit 1
          fi
          if [ -n "${MAVEN_GPG_PASSPHRASE:-}" ]; then echo "::add-mask::${MAVEN_GPG_PASSPHRASE}"; fi

          PROJ=".github/signing-selftest"
          echo "== Sign a throwaway artifact through Gradle's useInMemoryPgpKeys (BouncyCastle) =="
          gradle --no-daemon -p "$PROJ" signMakeArtifact --stacktrace

          ASC="$PROJ/build/signing-selftest.zip.asc"
          if [ -f "$ASC" ]; then
            echo "  Detached signature produced: $(wc -c < "$ASC") armored bytes"
            echo "RESULT: OK — Gradle's useInMemoryPgpKeys accepted the armored key + passphrase and produced a signature."
          else
            echo "::error::Gradle signing produced no .asc — useInMemoryPgpKeys could not build a usable signatory from MAVEN_GPG_PRIVATE_KEY / MAVEN_GPG_PASSPHRASE."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Download + cache the GGUF test models ONCE, upfront, for the whole pipeline.
  # Every Java test job (`test-java-*`) and the langchain4j integration job `needs:` this
  # job and then only RESTORES the shared cache (key gguf-models-<manifest hash>) — so the ~5 GB model
  # set is fetched from HuggingFace at most once per cache lifetime instead of racing to
  # download in each job. GGUF is platform-independent, so this single ubuntu job's cache
  # is reused by the macOS and Windows jobs too. On a warm cache this job is a no-op
  # restore; on a cold cache it downloads all models, validates them, and saves the cache
  # at job end (immutable key, so downstream jobs restore-hit). This is the single source
  # of the download logic — do not re-add per-job downloads.
  # ---------------------------------------------------------------------------

  download-models:
    name: Download + cache GGUF models (once)
    needs: startgate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache GGUF models (GitHub Actions cache; avoids re-downloading from HuggingFace)
        # This job is the ONLY writer of the model cache (every consumer job uses the
        # restore-only action). enableCrossOsArchive makes the one ubuntu-built entry
        # restorable on macOS AND Windows — without it, cache entries are versioned
        # per-OS, and the unreachable Windows-side entry was once found re-saved EMPTY
        # (343 B) after an eviction, silently starving the Windows jobs of models.
        uses: actions/cache@v6
        with:
          path: models/
          # GGUF is platform-independent, so ubuntu + macOS + Windows share one entry.
          # The key is derived from the model manifest, so EDITING models.csv
          # automatically creates a fresh complete entry — no manual cache deletion.
          key: gguf-models-${{ hashFiles('.github/models.csv') }}
          enableCrossOsArchive: true
      - name: Download missing models (manifest-driven, .github/models.csv)
        # The manifest is the single source of truth for the model set; this loop is
        # the ONLY place in CI that downloads models. Files already restored from the
        # cache are skipped, so a warm cache downloads nothing.
        run: |
          while IFS=, read -r name url; do
            case "$name" in ''|\#*) continue ;; esac
            test -f "models/$name" || curl -L --proto =https --proto-redir =https --fail --retry 5 --retry-all-errors "$url" --create-dirs -o "models/$name"
          done < .github/models.csv
      - name: List files in models directory
        run: ls -l models/
      - name: Validate model files
        run: bash .github/validate-models.sh

  # Prove the freshly written cache entry is restorable AND complete on every OS the
  # pipeline uses BEFORE any model-consuming job starts: the same restore-only action
  # the consumers use (fail-on-cache-miss makes an unrestorable entry fail here, not
  # deep inside a test job), followed by the full validate gate. Every model-backed
  # job `needs:` this instead of download-models directly.
  verify-model-cache:
    name: "Verify model cache (${{ matrix.os }})"
    needs: download-models
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            validate: bash .github/validate-models.sh
          - os: macos-15
            validate: bash .github/validate-models.sh
          - os: windows-2025-vs2026
            validate: .github\validate-models.bat
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Restore shared GGUF model cache (populated by download-models; no re-download)
        uses: actions/cache/restore@v6
        with:
          path: models/
          key: gguf-models-${{ hashFiles('.github/models.csv') }}
          enableCrossOsArchive: true
          fail-on-cache-miss: true
      - name: Validate model files
        run: ${{ matrix.validate }}

  # ---------------------------------------------------------------------------
  # Cross-compile jobs (Docker / dockcross) — produce release artifacts, no testing
  # ---------------------------------------------------------------------------

  code-style:
    name: Code style (spotless) + package graph
    needs: startgate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - name: Spotless check (fail fast on format violations)
        run: mvn -B --no-transfer-progress -f llama/pom.xml spotless:check
      - name: SpotBugs check (fail fast on static-analysis findings)
        run: mvn -B --no-transfer-progress -f llama/pom.xml -DskipTests -Denforcer.skip=true compile spotbugs:check
      - name: Print internal package dependency graph (jdeps, informational)
        continue-on-error: true
        run: |
          mvn -B --no-transfer-progress -f llama/pom.xml -DskipTests -Denforcer.skip=true compile
          echo "=== internal package dependency graph (jdeps, bytecode) ==="
          jdeps -verbose:package llama/target/classes | grep 'net.ladenthin.llama' || true

  # ---------------------------------------------------------------------------
  # Sibling module `llama-langchain4j` (LangChain4j adapters). Pure Java, no native
  # code and no per-classifier matrix: it compiles against the core's stable Java API
  # (identical across every classifier) and the backend is a runtime choice for the
  # consumer. This job installs the parent + core into the local repo, then builds + tests
  # the module (Java 17; langchain4j 1.x baseline). It runs its mapping unit tests; the
  # model-backed integration test self-skips without a GGUF. `verify` also builds the
  # javadoc/sources jars so a release-time javadoc break is caught here in PR CI. Version
  # lockstep is now guaranteed by construction (both modules inherit the parent's version),
  # so the old lockstep guard is gone.
  # ---------------------------------------------------------------------------

  test-java-llama-langchain4j:
    name: Build and Test llama-langchain4j
    needs: startgate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: Install parent + core net.ladenthin:llama into the local repo (Java only)
        run: >
          mvn -B --no-transfer-progress -pl llama -am -DskipTests -Denforcer.skip=true
          -Dspotless.check.skip=true -Dspotbugs.skip=true
          -Dmaven.javadoc.skip=true -Dmaven.source.skip=true -Dgpg.skip=true install
      - name: Build and test llama-langchain4j
        run: mvn -B --no-transfer-progress -f llama-langchain4j/pom.xml verify

  # ---------------------------------------------------------------------------
  # Model-free unit tests for the Kotlin coroutines facade (llama-kotlin).
  # Pure Kotlin/JVM reactor module; its 6 tests fake the Iterable+AutoCloseable
  # seam, so no native library and no model are needed.
  # ---------------------------------------------------------------------------

  test-java-llama-kotlin:
    name: Build and Test llama-kotlin
    needs: startgate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: Install parent + core net.ladenthin:llama into the local repo (Java only)
        run: >
          mvn -B --no-transfer-progress -pl llama -am -DskipTests -Denforcer.skip=true
          -Dspotless.check.skip=true -Dspotbugs.skip=true
          -Dmaven.javadoc.skip=true -Dmaven.source.skip=true -Dgpg.skip=true install
      - name: Build and test llama-kotlin
        run: mvn -B --no-transfer-progress -f llama-kotlin/pom.xml verify

  # ---------------------------------------------------------------------------
  # Model-backed integration for the langchain4j adapters. Reuses the SAME shared GGUF
  # cache (populated once by download-models) and the SAME Linux-x86_64 native artifact the
  # core Java jobs already use — no extra model download and no duplicated download logic
  # (restore-only cache, no curl steps). It exercises the chat / embedding / scoring
  # adapters against the already-cached chat (Qwen3-0.6B), nomic-embedding and jina-reranker
  # models. The model-backed tests self-skip when a model is absent, so a cold cache degrades
  # to a skip, never a failure.
  # ---------------------------------------------------------------------------

  test-java-llama-langchain4j-integration:
    name: Integration Test llama-langchain4j (model-backed)
    needs: [crosscompile-linux-x86_64, verify-model-cache]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download Linux x86_64 native library (reused, not rebuilt)
        uses: actions/download-artifact@v8
        with:
          name: Linux-x86_64-libraries
          path: ${{ github.workspace }}/llama/src/main/resources/net/ladenthin/llama/
      - name: Restore shared GGUF model cache (populated by download-models; no re-download)
        # Restore-only: consumer jobs can NEVER write the cache, so a job running on a
        # cache miss cannot re-save an empty/partial entry under the immutable key.
        # download-models is the single writer; enableCrossOsArchive matches its
        # cross-OS entry version so Windows/macOS restore the same ubuntu-built entry.
        uses: actions/cache/restore@v6
        with:
          path: models/
          key: gguf-models-${{ hashFiles('.github/models.csv') }}
          enableCrossOsArchive: true
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Install parent + core net.ladenthin:llama (bundles the downloaded native library)
        run: >
          mvn -B --no-transfer-progress -pl llama -am -DskipTests -Denforcer.skip=true
          -Dspotless.check.skip=true -Dspotbugs.skip=true
          -Dmaven.javadoc.skip=true -Dmaven.source.skip=true -Dgpg.skip=true install
      - name: Run llama-langchain4j model-backed integration tests (reused cached models)
        run: >
          mvn -B --no-transfer-progress -f llama-langchain4j/pom.xml test
          -Dnet.ladenthin.llama.model.path=models/${REASONING_MODEL_NAME}
          -Dnet.ladenthin.llama.langchain4j.embedding.model=models/${NOMIC_EMBED_MODEL_NAME}
          -Dnet.ladenthin.llama.langchain4j.rerank.model=models/${RERANKING_MODEL_NAME}
          -Dnet.ladenthin.llama.langchain4j.tool.model=models/${TOOL_MODEL_NAME}

  # ---------------------------------------------------------------------------
  # Build the llama.cpp WebUI ONCE, from the same pinned tag CMakeLists.txt fetches,
  # and share it to every native build as the generated, platform-independent
  # ui.cpp/ui.h ("webui-generated" artifact).  The native builds embed it into
  # libjllama (CMake's "WebUI assets" block); when this job's artifact is absent the
  # build falls back to the empty-asset stub.  npm runs only here, in one controlled
  # job — never in the dockcross cross-compilers (which have no node) or per-platform.
  # ---------------------------------------------------------------------------
  build-webui:
    name: Build WebUI assets (shared)
    needs: startgate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Resolve pinned llama.cpp tag from CMakeLists.txt
        id: tag
        shell: bash
        run: |
          TAG=$(grep -oE 'GIT_TAG[[:space:]]+b[0-9]+' llama/CMakeLists.txt | grep -oE 'b[0-9]+' | head -1)
          if [ -z "$TAG" ]; then
            echo "could not resolve llama.cpp GIT_TAG (b<nnnn>) from CMakeLists.txt" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Pinned llama.cpp WebUI tag: $TAG"
      - name: Checkout llama.cpp tools/ui at the pinned tag
        uses: actions/checkout@v7
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ steps.tag.outputs.tag }}
          path: llamacpp-ui
          sparse-checkout: tools/ui
          sparse-checkout-cone-mode: true
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: llamacpp-ui/tools/ui/package-lock.json
      - name: Build WebUI (Svelte/Vite)
        working-directory: llamacpp-ui/tools/ui
        env:
          HF_UI_VERSION: ${{ steps.tag.outputs.tag }}
          LLAMA_BUILD_NUMBER: ${{ steps.tag.outputs.tag }}
        run: |
          npm ci --ignore-scripts
          npm run build
          test -f dist/index.html
      - name: Embed assets into ui.cpp / ui.h (gzip parity with upstream)
        working-directory: llamacpp-ui/tools/ui
        shell: bash
        run: |
          set -euo pipefail
          # gzip every asset into dist/_gzip/<path> so llama-ui-embed embeds the
          # compressed bytes (LLAMA_UI_GZIP parity); embed auto-detects _gzip.
          ( cd dist && find . -type f -not -path './_gzip/*' | while read -r f; do
              mkdir -p "_gzip/$(dirname "$f")"
              gzip -9 -c "$f" > "_gzip/$f"
            done )
          # llama-ui-embed is a self-contained C++17 host tool (no npm) — build + run it.
          g++ -O2 -std=c++17 -o llama-ui-embed embed.cpp
          mkdir -p "$GITHUB_WORKSPACE/llama/webui-generated"
          ./llama-ui-embed \
            "$GITHUB_WORKSPACE/llama/webui-generated/ui.cpp" \
            "$GITHUB_WORKSPACE/llama/webui-generated/ui.h" \
            dist
          echo "=== generated WebUI assets ==="
          ls -la "$GITHUB_WORKSPACE/llama/webui-generated"
          if grep -q LLAMA_UI_HAS_ASSETS "$GITHUB_WORKSPACE/llama/webui-generated/ui.h"; then
            echo "LLAMA_UI_HAS_ASSETS: present (real WebUI embedded)"
          else
            echo "ERROR: embed produced an empty asset table" >&2
            exit 1
          fi
      - name: Upload WebUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: webui-generated
          path: ${{ github.workspace }}/llama/webui-generated/
          retention-days: 1
          if-no-files-found: error

  crosscompile-linux-x86_64-cuda:
    name: Cross-Compile manylinux_2_28 x86_64 (CUDA)
    needs: [startgate, build-webui]
    runs-on: ubuntu-latest
    # CUDA cache. build_cuda_linux.sh execs build.sh, so the same sccache probe guards this job.
    # build.sh also wraps nvcc (CMAKE_CUDA_COMPILER_LAUNCHER=sccache) for CUDA builds, so the
    # per-arch .cu device passes — the dominant cost of this job — cache over Depot alongside the
    # gcc host TUs. Verified on a warm run: 100% hit on CUDA / CUBIN / device-code (139 CUDA hits,
    # 99.86% overall), cutting the job from ~51 min cold to ~15 min warm. The job therefore always
    # builds the FULL CMAKE_CUDA_ARCHITECTURES set (no single-arch shortcut) and leans on the warm
    # cache for speed, so every artifact stays release-safe (runs on every GPU generation) on PR /
    # push as well as publish. CUDA_FAST_BUILD still exists in build_cuda_linux.sh as a LOCAL-dev
    # knob, but CI no longer sets it. The first-run sccache debug diagnostics (SCCACHE_LOG /
    # SCCACHE_ERROR_LOG / RUST_BACKTRACE) were dropped now that caching is confirmed; build.sh still
    # prints the `sccache --show-stats` hit table at the end of every run. Inert without DEPOT_TOKEN
    # (fork PRs) or use_cache=false.
    env:
      USE_CACHE: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
      SCCACHE_WEBDAV_ENDPOINT: https://cache.depot.dev
      SCCACHE_WEBDAV_TOKEN: ${{ secrets.DEPOT_TOKEN }}
      DOCKCROSS_ARGS: "-e SCCACHE_WEBDAV_ENDPOINT -e SCCACHE_WEBDAV_TOKEN -e USE_CACHE"
    steps:
      - uses: actions/checkout@v7
      - name: Download shared WebUI assets
        uses: actions/download-artifact@v8
        with:
          name: webui-generated
          path: ${{ github.workspace }}/llama/webui-generated/
      - name: Display CPU Info
        shell: bash
        run: |
          echo "=== Host CPU Information ==="
          lscpu
          echo ""
          echo "=== CPU Details from /proc/cpuinfo ==="
          cat /proc/cpuinfo
      - name: Build libraries
        shell: bash
        run: |
          .github/dockcross/dockcross-manylinux_2_28-x64 .github/build_cuda_linux.sh "-DOS_NAME=Linux -DOS_ARCH=x86_64"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-libraries-cuda
          path: ${{ github.workspace }}/llama/src/main/resources_linux_cuda/net/ladenthin/llama/

  crosscompile-linux-x86_64:
    name: Cross-Compile manylinux2014 x86_64

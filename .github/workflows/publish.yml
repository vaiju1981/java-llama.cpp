          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Package and publish
  # ---------------------------------------------------------------------------

  package:
    name: Package JARs
    needs:
      - crosscompile-linux-x86_64-cuda
      - crosscompile-linux-aarch64
      - build-linux-s390x
      - build-linux-x86_64-vulkan
      - build-linux-aarch64-vulkan
      - crosscompile-android-aarch64
      - crosscompile-android-x86_64
      - crosscompile-android-aarch64-opencl
      - build-windows-x86_64
      - build-windows-x86
      - build-windows-arm64
      - build-windows-x86_64-msvc
      - build-windows-x86-msvc
      - build-windows-x86_64-cuda
      - build-windows-x86_64-vulkan
      - build-windows-x86_64-opencl
      - build-linux-x86_64-rocm
      - build-windows-x86_64-rocm
      - build-linux-x86_64-sycl-fp16
      - build-linux-x86_64-sycl-fp32
      - build-windows-x86_64-sycl
      - build-windows-arm64-opencl
      - build-linux-x86_64-openvino
      - build-windows-x86_64-openvino
      - test-cpp-linux-x86_64
      - build-macos-arm64-metal-15
      - test-java-linux-x86_64
      - test-java-macos-arm64-metal
      - test-java-macos-arm64-no-metal
      - test-java-macos-arm64-metal-15
      - test-java-windows-x86_64
      - test-java-windows-x86_64-msvc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: "*-libraries"
          merge-multiple: true
          path: ${{ github.workspace }}/llama/src/main/resources/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: linux-libraries-cuda
          path: ${{ github.workspace }}/llama/src/main/resources_linux_cuda/net/ladenthin/llama/
      # Linux Vulkan classifiers (x86_64 + aarch64) share one tree; the two Maven profiles
      # split it by arch subdir into one single-arch classifier JAR each.
      - uses: actions/download-artifact@v8
        with:
          name: Linux-x86_64-vulkan
          path: ${{ github.workspace }}/llama/src/main/resources_linux_vulkan/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Linux-aarch64-vulkan
          path: ${{ github.workspace }}/llama/src/main/resources_linux_vulkan/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: android-libraries-opencl
          path: ${{ github.workspace }}/llama/src/main/resources_android_opencl/net/ladenthin/llama/
      # MSVC-built Windows natives -> `msvc-windows` classifier tree. The default JAR
      # now ships the Ninja `*-libraries` natives merged above (default flip).
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-msvc
          path: ${{ github.workspace }}/llama/src/main/resources_windows_msvc/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86-msvc
          path: ${{ github.workspace }}/llama/src/main/resources_windows_msvc/net/ladenthin/llama/
      # Windows GPU classifiers (x86_64 only) -> one tree each.
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-cuda
          path: ${{ github.workspace }}/llama/src/main/resources_windows_cuda/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-vulkan
          path: ${{ github.workspace }}/llama/src/main/resources_windows_vulkan/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-opencl
          path: ${{ github.workspace }}/llama/src/main/resources_windows_opencl/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Linux-x86_64-rocm
          path: ${{ github.workspace }}/llama/src/main/resources_linux_rocm/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-rocm
          path: ${{ github.workspace }}/llama/src/main/resources_windows_rocm/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Linux-x86_64-sycl-fp16
          path: ${{ github.workspace }}/llama/src/main/resources_linux_sycl_fp16/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Linux-x86_64-sycl-fp32
          path: ${{ github.workspace }}/llama/src/main/resources_linux_sycl_fp32/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-sycl
          path: ${{ github.workspace }}/llama/src/main/resources_windows_sycl/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-aarch64-opencl
          path: ${{ github.workspace }}/llama/src/main/resources_windows_opencl/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Linux-x86_64-openvino
          path: ${{ github.workspace }}/llama/src/main/resources_linux_openvino/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-openvino
          path: ${{ github.workspace }}/llama/src/main/resources_windows_openvino/net/ladenthin/llama/
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Build JARs
        # `assembly` additionally produces the fat jar-with-dependencies uber JAR
        # (llama-<version>-jar-with-dependencies.jar: library classes + Java runtime deps +
        # default-platform native libs in one drop-on-classpath JAR, runnable via its
        # ServerLauncher Main-Class). It lands in target/ and is uploaded in the `llama-jars`
        # artifact below - never a Maven Central asset; the `package-fatjars` job downstream
        # combines it with the classifier jars into the GitHub-Release fat-jar assets.
        # Windows classifier JARs: `windows-msvc` (MSVC-built CPU natives) plus the GPU
        # backends `cuda-windows` / `vulkan-windows` / `opencl-windows`. The default JAR's
        # Windows natives are the Ninja `*-libraries` merged into src/main/resources/ above.
        run: mvn --batch-mode --no-transfer-progress -P release,cuda,vulkan-linux,vulkan-linux-aarch64,opencl-android,windows-msvc,cuda-windows,vulkan-windows,opencl-windows,rocm-linux,rocm-windows,sycl-fp16-linux,sycl-fp32-linux,sycl-windows,opencl-windows-aarch64,openvino-linux,openvino-windows,assembly -Dmaven.test.skip=true -Dgpg.skip=true package
      - name: Upload JARs
        uses: actions/upload-artifact@v7
        with:
          name: llama-jars
          path: llama/target/*.jar

  package-fatjars:
    name: Package all-backends fat jars
    needs: [package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: llama-jars
          path: jars/
      # One self-contained multi-backend server fat jar per OS/arch
      # (llama-<version>-all-<os>-<arch>-jar-with-dependencies.jar): the default
      # jar-with-dependencies plus every GPU backend of that OS/arch in backend
      # subdirectories, described by the jllama-backends.txt priority manifest that
      # LlamaLoader reads at runtime (first loadable backend wins, CPU fallback).
      # These are GitHub-Release download assets ONLY - never deployed to Maven
      # Central (the deploy jobs run without the `assembly` profile and are untouched).
      # The script enumerates the classifiers from llama/pom.xml and fails loud on any
      # mismatch with the built classifier jars, so a new classifier cannot be silently
      # skipped.
      - name: Assemble all-backends fat jars
        run: bash .github/package-fatjars.sh jars fatjars llama/pom.xml
      - name: Upload fat jars
        uses: actions/upload-artifact@v7
        with:
          name: llama-fatjars
          path: fatjars/
          compression-level: 0 # jars are already deflated
          retention-days: 7 # multi-GB artifact; release jobs consume it within the same run
          if-no-files-found: error
      # Small single-jar artifacts so the smoke jobs don't download the multi-GB set.
      - name: Upload Linux smoke jar
        uses: actions/upload-artifact@v7
        with:
          name: llama-fatjar-smoke-linux
          path: fatjars/llama-*-all-linux-x86-64-jar-with-dependencies.jar
          compression-level: 0
          retention-days: 7
          if-no-files-found: error
      - name: Upload Windows smoke jar
        uses: actions/upload-artifact@v7
        with:
          name: llama-fatjar-smoke-windows
          path: fatjars/llama-*-all-windows-x86-64-jar-with-dependencies.jar
          compression-level: 0
          retention-days: 7
          if-no-files-found: error

  # GPU-less runners: every manifest backend must fail its load cleanly (missing vendor
  # runtimes) and the server must come up on the default CPU natives — this exercises
  # manifest parsing, per-backend extraction, and the fallback chain end-to-end through
  # a real `java -jar`, then proves the server serves /health + /v1/chat/completions.
  smoke-fatjar-linux:
    name: Smoke test all-backends fat jar (Linux)
    needs: [package-fatjars, verify-model-cache]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: llama-fatjar-smoke-linux
          path: fatjars/
      - name: Restore shared GGUF model cache (populated by download-models; no re-download)
        # Restore-only: consumer jobs can NEVER write the cache, so a job running on a
        # cache miss cannot re-save an empty/partial entry under the immutable key.
        # download-models is the single writer; enableCrossOsArchive matches its
        # cross-OS entry version so Windows/macOS restore the same ubuntu-built entry.
        uses: actions/cache/restore@v6
        with:
          path: models/
          key: gguf-models-${{ hashFiles('.github/models.csv') }}
          enableCrossOsArchive: true
      - name: Validate model files
        run: .github/validate-models.sh
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run fat-jar server smoke test
        run: .github/smoke-test-fatjar.sh fatjars 'llama-*-all-linux-x86-64-jar-with-dependencies.jar' "models/${DRAFT_MODEL_NAME}"
      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fatjar-smoke-linux-logs
          path: |
            server-out.log
            server-err.log
          if-no-files-found: warn

  smoke-fatjar-windows:
    name: Smoke test all-backends fat jar (Windows)
    needs: [package-fatjars, verify-model-cache]
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: llama-fatjar-smoke-windows
          path: fatjars/
      - name: Restore shared GGUF model cache (populated by download-models; no re-download)
        # Restore-only: consumer jobs can NEVER write the cache, so a job running on a
        # cache miss cannot re-save an empty/partial entry under the immutable key.
        # download-models is the single writer; enableCrossOsArchive matches its
        # cross-OS entry version so Windows/macOS restore the same ubuntu-built entry.
        uses: actions/cache/restore@v6
        with:
          path: models/
          key: gguf-models-${{ hashFiles('.github/models.csv') }}
          enableCrossOsArchive: true
      - name: Validate model files
        run: .github\validate-models.bat
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run fat-jar server smoke test
        shell: pwsh
        run: .github/smoke-test-fatjar.ps1 -JarDir fatjars -JarGlob 'llama-*-all-windows-x86-64-jar-with-dependencies.jar' -Model "models/$env:DRAFT_MODEL_NAME"
      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fatjar-smoke-windows-logs
          path: |
            server-out.log
            server-err.log
          if-no-files-found: warn

  report:
    name: Report
    needs: [package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with: { java-version: '${{ env.JAVA_VERSION }}', distribution: temurin }
      - uses: actions/download-artifact@v8
        with: { name: jacoco-report, path: target/site/jacoco/ }
        continue-on-error: true
      - uses: advanced-security/maven-dependency-submission-action@v5
      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: target/site/jacoco/jacoco.xml
          format: jacoco
        continue-on-error: true
      - name: Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml
        continue-on-error: true

  check-snapshot:
    name: "Check: main branch / SNAPSHOT"
    needs: [report]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Confirm snapshot ref
        run: echo "Confirmed on snapshot ref ${{ github.ref }}"

  check-tag:
    name: "Check: v* tag"
    needs: [report]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Confirm tag ref
        run: echo "Confirmed on tag ${{ github.ref }}"

  publish-snapshot:
    name: Publish Snapshot to Central
    needs: [check-snapshot, crosscompile-linux-x86_64-cuda, crosscompile-android-aarch64-opencl, package-android-aar, test-android-emulator, code-style, test-java-llama-langchain4j, test-java-llama-kotlin, package-fatjars, smoke-fatjar-linux, smoke-fatjar-windows]
    if: needs.check-snapshot.result == 'success' && inputs.publish_to_central
    runs-on: ubuntu-latest
    environment: maven-central
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: "*-libraries"
          merge-multiple: true
          path: ${{ github.workspace }}/llama/src/main/resources/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: linux-libraries-cuda
          path: ${{ github.workspace }}/llama/src/main/resources_linux_cuda/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Linux-x86_64-vulkan
          path: ${{ github.workspace }}/llama/src/main/resources_linux_vulkan/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Linux-aarch64-vulkan
          path: ${{ github.workspace }}/llama/src/main/resources_linux_vulkan/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: android-libraries-opencl
          path: ${{ github.workspace }}/llama/src/main/resources_android_opencl/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-msvc
          path: ${{ github.workspace }}/llama/src/main/resources_windows_msvc/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86-msvc
          path: ${{ github.workspace }}/llama/src/main/resources_windows_msvc/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-cuda
          path: ${{ github.workspace }}/llama/src/main/resources_windows_cuda/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-vulkan
          path: ${{ github.workspace }}/llama/src/main/resources_windows_vulkan/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-opencl
          path: ${{ github.workspace }}/llama/src/main/resources_windows_opencl/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Linux-x86_64-rocm
          path: ${{ github.workspace }}/llama/src/main/resources_linux_rocm/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-rocm
          path: ${{ github.workspace }}/llama/src/main/resources_windows_rocm/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Linux-x86_64-sycl-fp16
          path: ${{ github.workspace }}/llama/src/main/resources_linux_sycl_fp16/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Linux-x86_64-sycl-fp32
          path: ${{ github.workspace }}/llama/src/main/resources_linux_sycl_fp32/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-sycl
          path: ${{ github.workspace }}/llama/src/main/resources_windows_sycl/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-aarch64-opencl
          path: ${{ github.workspace }}/llama/src/main/resources_windows_opencl/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Linux-x86_64-openvino
          path: ${{ github.workspace }}/llama/src/main/resources_linux_openvino/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-openvino
          path: ${{ github.workspace }}/llama/src/main/resources_windows_openvino/net/ladenthin/llama/
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Guard - require a -SNAPSHOT version
        shell: bash
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n1)
          echo "Resolved project version: $VERSION"
          case "$VERSION" in
            *-SNAPSHOT) echo "OK: -SNAPSHOT version, continuing snapshot deploy." ;;
            *) echo "::error::Refusing to publish non-SNAPSHOT version '$VERSION' from the snapshot job. Snapshot publishing requires a -SNAPSHOT version; releases go through the v* tag path."; exit 1 ;;
          esac
      # One reactor deploy publishes all four Maven artifacts at the same version:
      # net.ladenthin:llama-parent (the pom), :llama (the core jar + classifiers),
      # :llama-langchain4j, and :llama-kotlin. The `release` profile (GPG + Central
      # Publishing) is inherited from the parent, so every module — including the
      # parent pom — is signed. The Android AARs are published by the separate
      # Gradle step below (Maven cannot deploy <packaging>aar</packaging>).
      # Informational only (nothing depends on it): logs the effective POM with the same
      # profile set as the deploy below, so the resolved central-publishing configuration
      # (waitUntil/waitMaxTime etc.) is visible for debugging.
      - name: Show effective POM (debug)
        run: mvn --batch-mode --no-transfer-progress -P release,cuda,vulkan-linux,vulkan-linux-aarch64,opencl-android,windows-msvc,cuda-windows,vulkan-windows,opencl-windows,rocm-linux,rocm-windows,sycl-fp16-linux,sycl-fp32-linux,sycl-windows,opencl-windows-aarch64,openvino-linux,openvino-windows help:effective-pom
      - name: Publish snapshot (reactor - parent + llama + llama-langchain4j + llama-kotlin)
        run: mvn --batch-mode --no-transfer-progress -P release,cuda,vulkan-linux,vulkan-linux-aarch64,opencl-android,windows-msvc,cuda-windows,vulkan-windows,opencl-windows,rocm-linux,rocm-windows,sycl-fp16-linux,sycl-fp32-linux,sycl-windows,opencl-windows-aarch64,openvino-linux,openvino-windows -Dmaven.test.skip=true deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      # Android AARs (llama-android, llama-android-opencl): assembled and published by
      # the plain-Gradle build in llama-android/ — Maven cannot deploy
      # <packaging>aar</packaging>. Natives are already on disk from the artifact
      # downloads above; the core jar was just built by the reactor deploy.
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.14.3"
      - name: Publish Android AAR snapshots (llama-android + llama-android-opencl)
        run: |
          mkdir -p llama-android/natives/cpu/arm64-v8a llama-android/natives/cpu/x86_64 llama-android/natives/opencl/arm64-v8a
          cp llama/src/main/resources/net/ladenthin/llama/Linux-Android/aarch64/libjllama.so llama-android/natives/cpu/arm64-v8a/
          cp llama/src/main/resources/net/ladenthin/llama/Linux-Android/x86_64/libjllama.so llama-android/natives/cpu/x86_64/
          cp llama/src/main/resources_android_opencl/net/ladenthin/llama/Linux-Android/aarch64/libjllama.so llama-android/natives/opencl/arm64-v8a/
          gradle -p llama-android publishAllPublicationsToCentralSnapshotsRepository
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      # Runs even when the deploy step failed: a Central publish-poll timeout reds the
      # job *after* the bundle was uploaded (and typically published server-side), while
      # the signed jars + .asc files already exist in target/ (signing happens at
      # verify). Collecting on failure lets the github-snapshot job still attach them.
      - name: Collect signed artifacts
        if: ${{ !cancelled() }}
        run: |
          mkdir -p signed-snapshot-assets
          cp llama/target/*.jar signed-snapshot-assets/ 2>/dev/null || true
          cp llama/target/*.jar.asc signed-snapshot-assets/ 2>/dev/null || true
          cp llama-langchain4j/target/*.jar signed-snapshot-assets/ 2>/dev/null || true
          cp llama-langchain4j/target/*.jar.asc signed-snapshot-assets/ 2>/dev/null || true
          cp llama-kotlin/target/*.jar signed-snapshot-assets/ 2>/dev/null || true
          cp llama-kotlin/target/*.jar.asc signed-snapshot-assets/ 2>/dev/null || true
          cp llama-android/build/aar/*.aar signed-snapshot-assets/ 2>/dev/null || true
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: signed-snapshot-assets
          path: signed-snapshot-assets/

  github-snapshot:
    name: Update Snapshot Pre-release on GitHub
    needs: [publish-snapshot, package-fatjars]
    # Also runs when publish-snapshot FAILED (not when skipped/cancelled): a Central
    # publish-poll timeout reds that job after the artifacts were already uploaded —
    # the GitHub pre-release assets must not be lost in that case.
    if: ${{ !cancelled() && (needs.publish-snapshot.result == 'success' || needs.publish-snapshot.result == 'failure') && needs.package-fatjars.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: signed-snapshot-assets
          path: snapshot-assets/
      # All-backends server fat jars (+ default CPU fat jar + sha256 files) — GitHub
      # download assets only, deliberately NOT deployed to Maven Central. Downloaded
      # into the same directory so the one upload glob below picks everything up
      # (fat-jar names are disjoint from the signed thin-jar names).
      - uses: actions/download-artifact@v8
        with:
          name: llama-fatjars
          path: snapshot-assets/
      - name: Update snapshot pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view snapshot --repo ${{ github.repository }} 2>/dev/null \
            || gh release create snapshot \
                 --repo ${{ github.repository }} \
                 --prerelease \
                 --title "Snapshot (latest)" \
                 --notes "Latest snapshot build from the main branch."
          gh release upload snapshot snapshot-assets/* \
            --repo ${{ github.repository }} \
            --clobber

  publish-release:
    name: Publish Release to Central
    if: needs.check-tag.result == 'success' && inputs.publish_to_central
    needs: [check-tag, crosscompile-linux-x86_64-cuda, crosscompile-android-aarch64-opencl, package-android-aar, test-android-emulator, code-style, test-java-llama-langchain4j, test-java-llama-kotlin, package-fatjars, smoke-fatjar-linux, smoke-fatjar-windows]
    runs-on: ubuntu-latest
    environment: maven-central
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: "*-libraries"
          merge-multiple: true
          path: ${{ github.workspace }}/llama/src/main/resources/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: linux-libraries-cuda
          path: ${{ github.workspace }}/llama/src/main/resources_linux_cuda/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Linux-x86_64-vulkan
          path: ${{ github.workspace }}/llama/src/main/resources_linux_vulkan/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Linux-aarch64-vulkan
          path: ${{ github.workspace }}/llama/src/main/resources_linux_vulkan/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: android-libraries-opencl
          path: ${{ github.workspace }}/llama/src/main/resources_android_opencl/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-msvc
          path: ${{ github.workspace }}/llama/src/main/resources_windows_msvc/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86-msvc
          path: ${{ github.workspace }}/llama/src/main/resources_windows_msvc/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-cuda
          path: ${{ github.workspace }}/llama/src/main/resources_windows_cuda/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-vulkan
          path: ${{ github.workspace }}/llama/src/main/resources_windows_vulkan/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:
          name: Windows-x86_64-opencl
          path: ${{ github.workspace }}/llama/src/main/resources_windows_opencl/net/ladenthin/llama/
      - uses: actions/download-artifact@v8
        with:

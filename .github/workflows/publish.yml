  # ---------------------------------------------------------------------------
  # Java test jobs — download release artifact, run mvn test
  # ---------------------------------------------------------------------------

  test-java-linux-x86_64:
    name: Java Tests Ubuntu Latest x86_64
    needs: [crosscompile-linux-x86_64, download-models]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Display CPU Info
        shell: bash
        run: |
          echo "=== CPU Information ==="
          lscpu
          echo ""
          echo "=== CPU Details from /proc/cpuinfo ==="
          cat /proc/cpuinfo
      - uses: actions/download-artifact@v8
        with:
          name: Linux-x86_64-libraries
          path: ${{ github.workspace }}/llama/src/main/resources/net/ladenthin/llama/
      # GGUF models are downloaded + cached ONCE by the upstream `download-models` job
      # (this job `needs:` it), so here we only RESTORE the shared cache — no per-job
      # download logic. GGUF is platform-independent, so ubuntu + macOS + Windows share
      # one entry (key gguf-models-v1). validate-models is kept as an integrity guard so a
      # partial/absent restore fails loudly instead of silently self-skipping required tests.
      - name: Restore shared GGUF model cache (populated by download-models; no re-download)
        uses: actions/cache@v6
        with:
          path: models/
          key: gguf-models-v1
      - name: Validate model files
        run: bash .github/validate-models.sh
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Memory before tests
        run: free -h
      - name: Enable core dumps
        run: |
          ulimit -c unlimited
          echo "${{ github.workspace }}/core.%e.%p" | sudo tee /proc/sys/kernel/core_pattern
      - name: Run tests
        run: |
          mvn -e --no-transfer-progress -f llama/pom.xml -P jcstress test \
            -Dnet.ladenthin.llama.tool.model=models/${TOOL_MODEL_NAME} \
            -Dnet.ladenthin.llama.nomic.path=models/${NOMIC_EMBED_MODEL_NAME} \
            -Dnet.ladenthin.llama.vision.model=models/${VISION_MODEL_NAME} \
            -Dnet.ladenthin.llama.vision.mmproj=models/${VISION_MMPROJ_NAME} \
            -Dnet.ladenthin.llama.vision.image=${VISION_IMAGE_PATH} \
            -Dnet.ladenthin.llama.tts.ttc.model=models/${TTS_MODEL_NAME} \
            -Dnet.ladenthin.llama.tts.vocoder.model=models/${TTS_VOCODER_NAME}
      - uses: actions/upload-artifact@v7
        if: success()
        with:
          name: jacoco-report
          path: llama/target/site/jacoco/jacoco.xml
          if-no-files-found: ignore
      - name: Run PIT mutation tests
        run: mvn --batch-mode --no-transfer-progress -f llama/pom.xml test-compile org.pitest:pitest-maven:mutationCoverage
      - name: Extract PIT survivors
        if: always()
        run: |
          echo "=== PIT Survived Mutations ==="
          for html_file in $(find llama/target/pit-reports -name "*.html" -type f 2>/dev/null | sort); do
            if grep -q "SURVIVED" "$html_file"; then
              echo "Found survivors in $html_file:"
              grep -B 2 -A 3 "SURVIVED" "$html_file"
              echo ""
            fi
          done
      - uses: actions/upload-artifact@v7
        if: always()
        with: { name: pit-reports, path: llama/target/pit-reports/ }
      - name: Memory after tests
        if: always()
        run: free -h
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: error-log-linux-x86_64
          path: |
            ${{ github.workspace }}/llama/hs_err_pid*.log
            ${{ github.workspace }}/core.*
            ${{ github.workspace }}/llama/*.hprof
            ${{ github.workspace }}/llama/target/surefire-reports/*.dump
            ${{ github.workspace }}/llama/target/surefire-reports/*.dumpstream
            ${{ github.workspace }}/llama/target/surefire-reports/*.txt
            ${{ github.workspace }}/llama/target/surefire-reports/TEST-*.xml
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # vmlens interleaving analysis — pure-Java, needs no native library or models.
  # Staged to a single smoke test for now (see the `vmlens` profile in pom.xml).
  # ---------------------------------------------------------------------------
  vmlens:
    name: Test (vmlens interleavings)
    needs: startgate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Test under vmlens (interleaving analysis)
        # Add each new test in the `vmlens` package to this -Dtest list (surefire
        # -Dtest matches simple class names, not package globs; the default suite is
        # excluded from the vmlens package via pom.xml managed surefire <excludes>).
        run: >-
          mvn --batch-mode --no-transfer-progress -f llama/pom.xml -Pvmlens test
          -Dtest=VmlensInterleavingSmokeTest,SessionStateInterleavingTest -DfailIfNoTests=false
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: vmlens-report
          path: llama/target/vmlens-report/
          if-no-files-found: ignore


  # ---------------------------------------------------------------------------
  # Android AAR packaging (net.ladenthin:llama-android + llama-android-opencl).
  # Plain-Gradle AAR assembly — no AGP and no Android SDK needed to BUILD (an AAR
  # is a documented zip; see llama-android/README.md); AGP is only needed to
  # CONSUME it, which the consumer smoke test below exercises on the runner's
  # preinstalled Android SDK: a minimal app resolves the AAR from mavenLocal and
  # runs a full R8 release build (validating AAR format, manifest minSdk merge,
  # jni/ packaging, and the shipped consumer proguard rules). Structural checks
  # additionally pin the AAR entries and the 16 KB LOAD-segment alignment
  # (Google Play requirement for Android 15+ targets). Fail-loud and in the
  # publish `needs:` graphs — a broken AAR blocks publishing, same policy as
  # every native artifact job.
  # ---------------------------------------------------------------------------

  package-android-aar:
    name: Package + Validate Android AARs
    needs: [crosscompile-android-aarch64, crosscompile-android-x86_64, crosscompile-android-aarch64-opencl]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.14.3"
      - name: Build core jar (byte-identical classes payload for the AAR)
        run: >
          mvn -B --no-transfer-progress -pl llama -am -DskipTests -Denforcer.skip=true
          -Dspotless.check.skip=true -Dspotbugs.skip=true
          -Dmaven.javadoc.skip=true -Dmaven.source.skip=true -Dgpg.skip=true package
      - name: Download Android CPU natives (arm64)
        uses: actions/download-artifact@v8
        with:
          name: Linux-Android-aarch64-libraries
          path: stage/cpu/
      - name: Download Android CPU natives (x86_64)
        uses: actions/download-artifact@v8
        with:
          name: Linux-Android-x86_64-libraries
          path: stage/cpu-x86_64/
      - name: Download Android OpenCL natives
        uses: actions/download-artifact@v8
        with:
          name: android-libraries-opencl
          path: stage/opencl/
      - name: Stage natives for the AAR build
        run: |
          mkdir -p llama-android/natives/cpu/arm64-v8a llama-android/natives/cpu/x86_64 llama-android/natives/opencl/arm64-v8a
          cp stage/cpu/Linux-Android/aarch64/libjllama.so llama-android/natives/cpu/arm64-v8a/
          cp stage/cpu-x86_64/Linux-Android/x86_64/libjllama.so llama-android/natives/cpu/x86_64/
          cp stage/opencl/Linux-Android/aarch64/libjllama.so llama-android/natives/opencl/arm64-v8a/
      - name: Assemble AARs + publish to mavenLocal
        run: gradle -p llama-android aarCpu aarOpencl publishToMavenLocal
      - name: Validate AAR structure + 16 KB page-size alignment
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n1)
          for flavor in llama-android llama-android-opencl; do
            AAR="llama-android/build/aar/${flavor}-${VERSION}.aar"
            echo "== validating $AAR"
            test -f "$AAR"
            # The CPU AAR is multi-ABI (arm64 devices + x86_64 emulators/devices);
            # the OpenCL flavor stays arm64-only (Adreno is Qualcomm ARM hardware).
            ABIS="arm64-v8a"
            if [ "$flavor" = "llama-android" ]; then ABIS="arm64-v8a x86_64"; fi
            ENTRIES="AndroidManifest.xml classes.jar proguard.txt R.txt"
            for abi in $ABIS; do ENTRIES="$ENTRIES jni/$abi/libjllama.so"; done
            for entry in $ENTRIES; do
              unzip -l "$AAR" | grep -q "${entry}$" || { echo "::error::$AAR is missing $entry"; exit 1; }
            done
            unzip -p "$AAR" AndroidManifest.xml | grep -q 'android:minSdkVersion="28"' \
              || { echo "::error::$AAR manifest lost minSdkVersion 28"; exit 1; }
            unzip -p "$AAR" classes.jar > /tmp/aar-classes.jar
            unzip -l /tmp/aar-classes.jar | grep -q "net/ladenthin/llama/LlamaModel.class" \
              || { echo "::error::$AAR classes.jar lost LlamaModel"; exit 1; }
            if unzip -l /tmp/aar-classes.jar | grep -qE "module-info\.class|net/ladenthin/llama/(Linux|Mac|Windows)/"; then
              echo "::error::$AAR classes.jar carries module-info or desktop native resources"; exit 1
            fi
            rm -rf /tmp/aar-natives && unzip -o -q -d /tmp/aar-natives "$AAR" "jni/*/libjllama.so"
            # Google Play 16 KB page-size requirement (Android 15+ targets): every
            # LOAD segment must be aligned to a multiple of 16384. CMake pins
            # -Wl,-z,max-page-size=16384 for every Android ABI; this asserts it held.
            for so in /tmp/aar-natives/jni/*/libjllama.so; do
              for align in $(readelf -lW "$so" | awk '$1=="LOAD"{print $NF}'); do
                if [ $(( align % 16384 )) -ne 0 ]; then
                  echo "::error::$so: LOAD alignment $align is not a multiple of 16384 (16 KB page-size regression)"; exit 1
                fi
              done
              # dlopen-ability gate: an app consuming the AAR bundles no other native
              # libs, so every DT_NEEDED must be a bionic system library (plus the
              # vendor ICD libOpenCL.so for the OpenCL flavor). A stray dependency —
              # libomp.so / libc++_shared.so once shipped exactly this way — makes
              # System.loadLibrary fail on every device with UnsatisfiedLinkError.
              # CMake's Android guard (GGML_OPENMP OFF + -static-libstdc++) keeps the
              # list clean; this asserts it held.
              ALLOWED="libc.so libm.so libdl.so liblog.so libandroid.so"
              if [ "$flavor" = "llama-android-opencl" ]; then ALLOWED="$ALLOWED libOpenCL.so"; fi
              for needed in $(readelf -dW "$so" | awk '/\(NEEDED\)/{gsub(/[\[\]]/,"",$NF); print $NF}'); do
                case " $ALLOWED " in
                  *" $needed "*) ;;
                  *) echo "::error::$so: DT_NEEDED '$needed' is not a bionic system library — dlopen would fail on-device"; exit 1 ;;
                esac
              done
            done
          done
      - name: AGP consumer smoke test (R8 release build from mavenLocal)
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n1)
          gradle -p .github/android-consumer-test assembleRelease "-PjllamaVersion=${VERSION}"
          APK=.github/android-consumer-test/app/build/outputs/apk/release/app-release.apk
          test -f "$APK"
          for abi in arm64-v8a x86_64; do
            unzip -l "$APK" | grep -q "lib/$abi/libjllama.so" \
              || { echo "::error::consumer APK is missing lib/$abi/libjllama.so"; exit 1; }
          done
          # The AAR's consumer proguard.txt must have carried the binding through R8.
          unzip -p "$APK" "classes*.dex" | grep -aq "Lnet/ladenthin/llama/LlamaModel;" \
            || { echo "::error::R8 stripped net.ladenthin.llama.LlamaModel — consumer proguard rules broken"; exit 1; }
      - name: Upload AARs
        uses: actions/upload-artifact@v7
        with:
          name: llama-android-aars
          path: llama-android/build/aar/*.aar
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # On-emulator runtime validation of the Android AAR: boots a KVM-accelerated
  # x86_64 emulator (GitHub Linux runners have KVM; arm64 images cannot run here,
  # which is exactly why the AAR carries the jni/x86_64 ABI), publishes the CPU AAR
  # to mavenLocal, adb-pushes the already-cached tiny draft model, and runs the
  # consumer fixture's connectedDebugAndroidTest — System.loadLibrary from the APK,
  # pure-Java GgufInspector on-device, and real native inference on Android/bionic.
  # RELEASE GATE (in both publish needs graphs) since PR #298: the job ran
  # flake-free through the PR's validation cycle (boot ~30 s, on-device inference
  # green), so a broken on-device runtime now blocks publishing — same fail-loud
  # policy as every native artifact job. If emulator-boot flakiness ever appears,
  # re-run the job first; demote it from the needs graphs only as a last resort.
  # ---------------------------------------------------------------------------

  test-android-emulator:
    name: Android emulator on-device test (x86_64)
    needs: [crosscompile-android-aarch64, crosscompile-android-x86_64, verify-model-cache]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.14.3"
      - name: Enable KVM group permissions (GitHub-hosted runner)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Build core jar (classes payload for the AAR)
        run: >
          mvn -B --no-transfer-progress -pl llama -am -DskipTests -Denforcer.skip=true
          -Dspotless.check.skip=true -Dspotbugs.skip=true
          -Dmaven.javadoc.skip=true -Dmaven.source.skip=true -Dgpg.skip=true package
      - name: Download Android CPU natives (arm64)
        uses: actions/download-artifact@v8
        with:
          name: Linux-Android-aarch64-libraries
          path: stage/cpu/
      - name: Download Android CPU natives (x86_64)
        uses: actions/download-artifact@v8
        with:
          name: Linux-Android-x86_64-libraries
          path: stage/cpu-x86_64/
      - name: Stage natives + publish the CPU AAR to mavenLocal
        run: |
          mkdir -p llama-android/natives/cpu/arm64-v8a llama-android/natives/cpu/x86_64
          cp stage/cpu/Linux-Android/aarch64/libjllama.so llama-android/natives/cpu/arm64-v8a/
          cp stage/cpu-x86_64/Linux-Android/x86_64/libjllama.so llama-android/natives/cpu/x86_64/
          gradle -p llama-android publishLlamaAndroidPublicationToMavenLocal
      - name: Restore shared GGUF model cache (populated by download-models; no re-download)
        # Restore-only: consumer jobs can NEVER write the cache, so a job running on a
        # cache miss cannot re-save an empty/partial entry under the immutable key.
        # download-models is the single writer; enableCrossOsArchive matches its
        # cross-OS entry version so Windows/macOS restore the same ubuntu-built entry.
        uses: actions/cache/restore@v6
        with:
          path: models/
          key: gguf-models-${{ hashFiles('.github/models.csv') }}
          enableCrossOsArchive: true
      - name: Free disk space for the emulator (only the draft model is needed on-device)
        # Same guard as test-android-llmservice: the AVD userdata partition needs ~7.4 GB; drop the
        # rest of the restored ~10 GB GGUF cache (this job adb-pushes only the tiny draft model) plus
        # large preinstalled toolchains so the emulator can create userdata and boot.
        run: |
          echo "Disk before cleanup:"; df -h / | tail -1
          find models -type f ! -name "${DRAFT_MODEL_NAME}" -delete 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/powershell /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          docker image prune -af 2>/dev/null || true
          echo "Disk after cleanup:"; df -h / | tail -1
      - name: Run on-emulator instrumentation (connectedDebugAndroidTest)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          # One line on purpose: the emulator-runner executes `script:` LINE BY LINE via sh,
          # so shell control flow must live in the committed helper script.
          script: .github/run-android-emulator-test.sh
      - name: Upload instrumentation reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-emulator-test-reports
          path: .github/android-consumer-test/app/build/reports/androidTests/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # The shippable Android app "LLM Service" (android-llmservice) — a KISS, fully-offline
  # on-device chat app consuming the llama-android AAR + llama-kotlin facade. Split into TWO jobs
  # so the installable artifacts are ALWAYS produced even when the on-device UI test is flaky/slow:
  #   * build-android-llmservice — builds the signed release AAB (real upload key when the
  #     ANDROID_UPLOAD_KEYSTORE_BASE64 secret is set, else debug-signed) + the installable APK and
  #     uploads both. No emulator, so a flaky/slow emulator can NEVER block getting the APK.
  #   * test-android-llmservice — a SEPARATE, non-gating check that boots the KVM x86_64 emulator
  #     and runs the app's Compose UI test (type a prompt, tap Send) against real on-device
  #     inference. It can go red on its own without stopping the build/artifacts.
  # Neither is a publish gate (unlike test-android-emulator): a Compose/AGP toolchain hiccup must
  # not block a Maven Central release of the library. Keep test-android-llmservice non-required in
  # branch protection to keep the emulator test optional (visible-but-non-blocking).
  # ---------------------------------------------------------------------------

  build-android-llmservice:
    name: Build the LLM Service Android app (AAB + APK)
    needs: [crosscompile-android-aarch64, crosscompile-android-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6
        with:
          # Kotlin 2.4's Gradle plugin deprecates Gradle < 8.14.4; the app uses the Kotlin
          # Android plugin, so bump this job to 8.14.4 (also carries two security fixes). The
          # AAR/lib jobs stay on the more-compatible 8.14.3 — they use no Kotlin Gradle plugin.
          gradle-version: "8.14.4"
      - name: Build core jar + install llama-kotlin facade to mavenLocal
        # install (not package) so the app's Gradle build resolves llama-kotlin +
        # the core POM from mavenLocal. llama-kotlin's core dep is provided-scope, so the
        # desktop JAR is never pulled into the APK — the AAR supplies net.ladenthin.llama.*.
        run: >
          mvn -B --no-transfer-progress -pl llama,llama-kotlin -am -DskipTests -Denforcer.skip=true
          -Dspotless.check.skip=true -Dspotbugs.skip=true
          -Dmaven.javadoc.skip=true -Dmaven.source.skip=true -Dgpg.skip=true install
      - name: Download Android CPU natives (arm64)
        uses: actions/download-artifact@v8
        with:
          name: Linux-Android-aarch64-libraries
          path: stage/cpu/
      - name: Download Android CPU natives (x86_64)
        uses: actions/download-artifact@v8
        with:
          name: Linux-Android-x86_64-libraries
          path: stage/cpu-x86_64/
      - name: Stage natives + publish the CPU AAR to mavenLocal
        run: |
          mkdir -p llama-android/natives/cpu/arm64-v8a llama-android/natives/cpu/x86_64
          cp stage/cpu/Linux-Android/aarch64/libjllama.so llama-android/natives/cpu/arm64-v8a/
          cp stage/cpu-x86_64/Linux-Android/x86_64/libjllama.so llama-android/natives/cpu/x86_64/
          gradle -p llama-android publishLlamaAndroidPublicationToMavenLocal
      - name: Decode upload keystore (if configured)
        # Optional Play upload key. Set the ANDROID_UPLOAD_KEYSTORE_BASE64 secret
        # (base64 of a PKCS12/JKS upload keystore) plus the three password/alias secrets
        # below to sign the release AAB with a real upload key. Without it the release
        # build falls back to debug signing (app/build.gradle.kts) so this step is inert
        # on forks/PRs where secrets are withheld.
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -n "${KEYSTORE_B64}" ]; then
            echo "${KEYSTORE_B64}" | base64 -d > "${RUNNER_TEMP}/upload-keystore.jks"
            echo "JLLAMA_UPLOAD_STORE_FILE=${RUNNER_TEMP}/upload-keystore.jks" >> "$GITHUB_ENV"
            echo "Upload keystore decoded -> release AAB will be signed with the upload key."
          else
            echo "No ANDROID_UPLOAD_KEYSTORE_BASE64 secret -> release AAB will be debug-signed."
          fi
      - name: Build release bundle (AAB) + installable APK
        env:
          JLLAMA_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          JLLAMA_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          JLLAMA_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n1)
          # bundleRelease -> app-release.aab (Play upload, NOT directly installable);
          # assembleRelease -> app-release.apk (sideloadable installable, debug-signed unless the
          # upload-key secrets are set). The debug + androidTest APKs are built by the emulator
          # test job (test-android-llmservice), not here — this job never touches the emulator.
          gradle -p android-llmservice bundleRelease assembleRelease "-PjllamaVersion=${VERSION}"
          test -f android-llmservice/app/build/outputs/bundle/release/app-release.aab
          test -f android-llmservice/app/build/outputs/apk/release/app-release.apk
      - name: Upload release bundle (AAB — for Play upload)
        uses: actions/upload-artifact@v7
        with:
          name: android-llmservice-aab
          path: android-llmservice/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
      - name: Upload installable APK (release — sideload / adb install)
        # Directly installable APK, downloadable from this run's Artifacts (independent of any
        # release). Debug-signed unless the ANDROID_UPLOAD_* secrets are set. This is the file to
        # grab to try the app on a phone; the .aab above is only for the Play Console.
        uses: actions/upload-artifact@v7
        with:
          name: android-llmservice-apk
          path: android-llmservice/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  test-android-llmservice:
    name: LLM Service app UI test on emulator (non-gating)
    needs: [crosscompile-android-aarch64, crosscompile-android-x86_64, verify-model-cache]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.14.4"
      - name: Enable KVM group permissions (GitHub-hosted runner)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Build core jar + install llama-kotlin facade to mavenLocal
        run: >
          mvn -B --no-transfer-progress -pl llama,llama-kotlin -am -DskipTests -Denforcer.skip=true
          -Dspotless.check.skip=true -Dspotbugs.skip=true
          -Dmaven.javadoc.skip=true -Dmaven.source.skip=true -Dgpg.skip=true install
      - name: Download Android CPU natives (arm64)
        uses: actions/download-artifact@v8
        with:
          name: Linux-Android-aarch64-libraries
          path: stage/cpu/
      - name: Download Android CPU natives (x86_64)
        uses: actions/download-artifact@v8
        with:
          name: Linux-Android-x86_64-libraries
          path: stage/cpu-x86_64/
      - name: Stage natives + publish the CPU AAR to mavenLocal
        run: |
          mkdir -p llama-android/natives/cpu/arm64-v8a llama-android/natives/cpu/x86_64
          cp stage/cpu/Linux-Android/aarch64/libjllama.so llama-android/natives/cpu/arm64-v8a/
          cp stage/cpu-x86_64/Linux-Android/x86_64/libjllama.so llama-android/natives/cpu/x86_64/
          gradle -p llama-android publishLlamaAndroidPublicationToMavenLocal
      - name: Restore shared GGUF model cache (populated by download-models; no re-download)
        uses: actions/cache/restore@v6
        with:
          path: models/
          key: gguf-models-${{ hashFiles('.github/models.csv') }}
          enableCrossOsArchive: true
      - name: Free disk space for the emulator (only the draft model is needed on-device)
        # The AVD userdata partition needs ~7.4 GB; the full ~10 GB GGUF cache restore leaves too
        # little free, so the emulator FATALs ("Not enough space to create userdata partition") and
        # the boot poll loops until timeout. This job only adb-pushes the tiny draft model, so drop
        # the rest of the restored cache plus large preinstalled toolchains it never uses.
        run: |
          echo "Disk before cleanup:"; df -h / | tail -1
          find models -type f ! -name "${DRAFT_MODEL_NAME}" -delete 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/powershell /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          docker image prune -af 2>/dev/null || true
          echo "Disk after cleanup:"; df -h / | tail -1
      - name: Run LLM Service UI test on emulator (connectedDebugAndroidTest)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          # One line on purpose: the emulator-runner executes `script:` LINE BY LINE via sh.
          script: .github/run-android-llmservice-test.sh
      - name: Upload instrumentation reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-llmservice-test-reports
          path: android-llmservice/app/build/reports/androidTests/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Native build jobs — produce release artifacts + run C++ unit tests
  # ---------------------------------------------------------------------------

  build-macos-arm64-no-metal:
    name: Build and Test macOS 15 arm64 (no Metal)
    needs: [startgate, build-webui]
    runs-on: macos-15
    env:
      BUILD_JOBS: 2
      USE_CACHE: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
      SCCACHE_WEBDAV_ENDPOINT: https://cache.depot.dev
      SCCACHE_WEBDAV_TOKEN: ${{ secrets.DEPOT_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - name: Download shared WebUI assets
        uses: actions/download-artifact@v8
        with:
          name: webui-generated
          path: ${{ github.workspace }}/llama/webui-generated/
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Display CPU Info
        shell: bash
        run: |
          echo "=== CPU Information ==="
          sysctl hw.model hw.cachelinesize hw.cpufrequency hw.cachesize hw.physicalcpu hw.logicalcpu hw.packages hw.memsize hw.ncpu 2>/dev/null || true
          echo ""
          echo "=== Processor Details ==="
          system_profiler SPHardwareDataType
      - name: Install sccache (shared compiler cache)
        if: env.USE_CACHE == 'true' && env.SCCACHE_WEBDAV_TOKEN != ''
        continue-on-error: true
        run: brew install sccache
      - name: Build libraries
        shell: bash
        run: |
          mvn --no-transfer-progress -f llama/pom.xml compile
          .github/build.sh -DLLAMA_METAL=OFF -DGGML_NATIVE=OFF -DBUILD_TESTING=ON
      - name: Run C++ unit tests
        run: ctest --test-dir llama/build --output-on-failure
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-15-libraries
          path: ${{ github.workspace }}/llama/src/main/resources/net/ladenthin/llama/

  build-macos-arm64-metal:
    name: Build and Test macOS 14 arm64 (Metal)

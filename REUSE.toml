# GITHUB/ISSUE_TEMPLATE/config.yml handled by reuse annotate below
# CODEOWNERS (# comments supported but file has no extension)
[[annotations]]
path = ".github/CODEOWNERS"
SPDX-FileCopyrightText = [
    "2023-2025 Konstantin Herud",
    "2026 Bernard Ladenthin <bernard.ladenthin@gmail.com>",
]
SPDX-License-Identifier = "MIT"

# llama.cpp source patches (unified-diff format cannot carry inline SPDX without corrupting the
# diff). Glob covers every current and future patch dropped into patches/ — see CLAUDE.md
# "Local llama.cpp source patches".
[[annotations]]
path = "llama/patches/**"
SPDX-FileCopyrightText = "2026 Bernard Ladenthin <bernard.ladenthin@gmail.com>"
SPDX-License-Identifier = "MIT"

# Project logo / branding assets (binary + generated SVG, cannot carry inline SPDX
# without corrupting the base64-embedded font). Same MIT OR Apache-2.0 dual license
# the author ships them under in the workspace repo (the embedded Martian Mono font
# is OFL-1.1; only the standalone .ttf — not shipped here — carries that identifier).
[[annotations]]
path = [
    "docs/branding/java-llama-cpp.svg",
    "docs/branding/java-llama-cpp.png",
]
SPDX-FileCopyrightText = "2026 Bernard Ladenthin <bernard.ladenthin@gmail.com>"
SPDX-License-Identifier = "MIT OR Apache-2.0"

# Android launcher-icon PNGs (binary, cannot carry inline SPDX). Generated from the
# shard-J of the java-llama.cpp logo; same MIT OR Apache-2.0 as the branding assets
# above (the adaptive-icon + colour XMLs carry their SPDX headers inline).
[[annotations]]
path = "android-llmservice/app/src/main/res/mipmap-*/ic_launcher*.png"
SPDX-FileCopyrightText = "2026 Bernard Ladenthin <bernard.ladenthin@gmail.com>"
SPDX-License-Identifier = "MIT OR Apache-2.0"

# Test image (binary, cannot carry inline SPDX)
[[annotations]]
path = "llama/src/test/resources/images/test-image.jpg"
SPDX-FileCopyrightText = "2026 Bernard Ladenthin <bernard.ladenthin@gmail.com>"
SPDX-License-Identifier = "MIT"

# Test audio clip recorded by the project author; granted under MIT for this
# project (see llama/src/test/resources/audios/README.md).
[[annotations]]
path = "llama/src/test/resources/audios/sample.wav"
SPDX-FileCopyrightText = "2026 Bernard Ladenthin <bernard.ladenthin@gmail.com>"
SPDX-License-Identifier = "MIT"

# Backend-manifest loader test fixtures (backendtest/ + backendtest-ok/):
# deliberately unloadable fake *.so placeholders (one-line text files) plus two
# trivial real x86-64 ELF dummies in backendtest-ok/ (built from a one-line C
# TU, no upstream code) — .so files have no inline-comment syntax for SPDX
# headers; the manifest .txt files carry theirs inline. Consumed by
# BackendManifestLoadTest.
[[annotations]]
path = "llama/src/test/resources/net/ladenthin/llama/Linux/backendtest*/**"
SPDX-FileCopyrightText = "2026 Bernard Ladenthin <bernard.ladenthin@gmail.com>"
SPDX-License-Identifier = "MIT"

# JNI header files from Oracle (GPL-2.0-only WITH Classpath-exception-2.0)
[[annotations]]
path = [
    ".github/include/unix/jni.h",
    ".github/include/unix/jni_md.h",
    ".github/include/windows/jni.h",
    ".github/include/windows/jni_md.h",
]
SPDX-FileCopyrightText = "1996-2023 Oracle and/or its affiliates"
SPDX-License-Identifier = "GPL-2.0-only WITH Classpath-exception-2.0"

